<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title>AI Translator</title>
  <link rel="stylesheet" href="css/tailwind-minimal.css" />
  <link rel="stylesheet" href="fonts/inter.css" />
  <link rel="stylesheet" href="fonts/noto-emoji.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="modern-bg">
  <div class="container">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="select-container">
        <select id="target-lang" class="modern-select">
          <option value="vi">🇻🇳 Tiếng Việt</option>
          <option value="en">🇺🇸 English</option>
          <option value="ja">🇯🇵 日本語</option>
          <option value="zh">🇨🇳 中文</option>
          <option value="ko">🇰🇷 한국어</option>
        </select>
      </div>

      <div class="select-container">
        <select id="tone-select" class="modern-select">
          <option value="auto">✨ Tone gốc</option>
          <option value="formal">💼 Trang trọng – Công văn, văn phòng</option>
          <option value="casual">😊 Thân mật – Chat, mạng xã hội</option>
          <option value="technical">⚙️ Kỹ thuật – Giữ thuật ngữ</option>
        </select>
      </div>

      <div class="toolbar-actions">
        <button id="history-button" class="icon-button" title="Lịch sử dịch">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12a9 9 0 101.8-5.4M3 4v3.6h3.6M12 7v5l3 3" />
          </svg>
        </button>
        <span class="toolbar-divider"></span>
        <button id="settings-button" class="icon-button" title="Mở cài đặt">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
      </div>

      <!-- History Popover -->
      <div id="history-popover" class="history-popover hidden">
        <div class="history-popover-header">
          <span class="history-popover-title">Lịch sử gần đây</span>
          <button id="history-clear-button" class="history-clear-button" type="button">Xóa hết</button>
        </div>
        <div id="history-list" class="history-list"></div>
      </div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <div class="textarea-container">
        <textarea id="input-text" rows="4" class="modern-textarea input-textarea"
          placeholder="Nhập hoặc dán văn bản tại đây..." aria-label="Nhập văn bản cần dịch" autofocus></textarea>
      </div>
    </div>

    <!-- Output Section -->
    <div class="output-section">
      <div class="textarea-container relative">
        <textarea id="output-text" rows="4" class="modern-textarea output-textarea"
          placeholder="Kết quả dịch sẽ hiển thị tại đây..." aria-label="Kết quả dịch"></textarea>
        <button id="copy-button" class="copy-button" title="Sao chép">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
        </button>
        <a id="check-quota-link" href="https://aistudio.google.com/rate-limit" target="_blank" class="quota-link hidden"
          title="Xem hạn mức sử dụng">
          Kiểm tra
        </a>
        <div class="copied-notification" id="copied-label">Đã sao chép!</div>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
